<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Discord Widget</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: transparent;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 12px;
    }

    .discord-card {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: #111214;
      border-radius: 16px;
      width: 100%;
      max-width: 300px;
      color: white;
      overflow: visible;
      padding: 0 0 16px 0;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    /* Banner */
    .discord-banner {
      width: 100%;
      height: 80px;
      background-color: #5865f2;
      background-size: cover;
      background-position: center;
      border-radius: 16px 16px 0 0;
      cursor: pointer;
      position: relative;
      /* KHÔNG dùng overflow:hidden ở đây để avatar không bị clip */
      transition: filter 0.3s;
    }

    /* Inner wrapper giới hạn overlay chỉ trong vùng banner */
    .discord-banner-inner {
      position: absolute;
      inset: 0;
      border-radius: 16px 16px 0 0;
      overflow: hidden;
      pointer-events: none;
    }
    .discord-banner-inner::before {
      content: '';
      position: absolute; inset: 0;
      background: rgba(0,0,0,0);
      transition: background 0.3s;
    }
    .discord-banner:hover .discord-banner-inner::before { background: rgba(0,0,0,0.5); }
    .discord-banner-inner::after {
      content: '\f00e';
      font-family: 'Font Awesome 6 Free'; font-weight: 900;
      position: absolute; top: 50%; right: 16px;
      transform: translateY(-50%);
      font-size: 20px; color: white;
      opacity: 0; transition: opacity 0.3s;
    }
    .discord-banner:hover .discord-banner-inner::after { opacity: 1; }

    /* Avatar */
    .avatar-container {
      position: relative;
      width: 80px; height: 80px;
      margin-top: -40px;
      border: 6px solid #111214;
      border-radius: 50%;
      background: #111214;
      cursor: pointer;
    }

    #avatar {
      width: 100%; height: 100%;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      position: relative; z-index: 1;
      transition: filter 0.3s;
    }
    .avatar-container:hover #avatar { filter: brightness(0.4); }

    .avatar-container::before {
      content: '';
      position: absolute; inset: 0;
      border-radius: 50%;
      background: rgba(0,0,0,0);
      transition: background 0.3s;
      z-index: 2; pointer-events: none;
    }
    .avatar-container::after {
      content: '\f00e';
      font-family: 'Font Awesome 6 Free'; font-weight: 900;
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 26px; color: white;
      opacity: 0; transition: opacity 0.3s;
      pointer-events: none; z-index: 3;
    }
    .avatar-container:hover::after { opacity: 1; }

    #decoration {
      position: absolute;
      top: -11%; left: -11%;
      width: 122%; height: 122%;
      z-index: 4; pointer-events: none;
    }

    #status {
      position: absolute;
      bottom: -2px; right: -2px;
      width: 18px; height: 18px;
      border-radius: 50%;
      border: 4px solid #111214;
      z-index: 10;
    }

    /* User info */
    .user-info {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 8px 16px 0;
      width: 100%;
      gap: 5px;
    }

    #username {
      font-weight: 700;
      font-size: 17px;
      color: #fff;
      word-break: break-word;
    }

    #activity {
      font-size: 13px;
      color: #b5bac1;
      max-width: 230px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: pointer;
      transition: color 0.2s;
    }
    #activity:hover { color: #dcddde; }

    /* Badges */
    #badges {
      display: flex;
      gap: 4px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 2px;
    }

    .badge-wrapper {
      position: relative;
      display: inline-block;
    }
    .badge-wrapper:hover::after {
      content: attr(data-title);
      position: absolute;
      bottom: 100%; left: 50%;
      transform: translateX(-50%);
      margin-bottom: 6px;
      background: #111214;
      color: white;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      white-space: nowrap;
      z-index: 9999;
      box-shadow: 0 2px 8px rgba(0,0,0,0.6);
      pointer-events: none;
    }

    .badge-icon {
      width: 22px; height: 22px;
      object-fit: contain;
      cursor: pointer;
    }

    /* Activity card */
    .activity-card {
      background: #1e1f22;
      border-radius: 8px;
      padding: 10px 12px;
      margin-top: 6px;
      width: 100%;
      display: none;
      flex-direction: row;
      gap: 10px;
      align-items: center;
    }
    .activity-card.active { display: flex; }

    .activity-image {
      width: 52px; height: 52px;
      border-radius: 6px;
      object-fit: cover;
      flex-shrink: 0;
    }

    .activity-details {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .activity-name {
      font-weight: 600;
      font-size: 13px;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .activity-state,
    .activity-details-text {
      font-size: 11px;
      color: #b5bac1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .activity-timestamp {
      font-size: 10px;
      color: #6d6f78;
      margin-top: 2px;
    }

    /* External link button */
    .card-link-btn {
      position: absolute;
      bottom: 12px; right: 12px;
      background: rgba(255,255,255,0.07);
      color: #b5bac1;
      padding: 4px 8px;
      border-radius: 4px;
      text-decoration: none;
      font-size: 12px;
      transition: all 0.2s;
      border: 1px solid transparent;
    }
    .card-link-btn:hover {
      background: rgba(255,255,255,0.15);
      color: white;
      border-color: rgba(255,255,255,0.2);
    }

    /* Lightboxes */
    .lightbox {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0);
      z-index: 9999;
      justify-content: center;
      align-items: center;
      cursor: zoom-out;
      transition: background 0.3s;
    }
    .lightbox.active {
      display: flex;
      background: rgba(0,0,0,0.92);
    }
    .lightbox img {
      max-width: 90%; max-height: 90%;
      object-fit: contain;
      border-radius: 12px;
      transform: scale(0.6); opacity: 0;
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), opacity 0.25s;
    }
    .lightbox.active img { transform: scale(1); opacity: 1; }
    #avatar-lightbox img { border-radius: 50%; }

    .lightbox-close {
      position: absolute;
      top: 18px; right: 26px;
      font-size: 36px; color: white;
      cursor: pointer;
      transition: all 0.25s;
      opacity: 0;
      line-height: 1;
    }
    .lightbox.active .lightbox-close { opacity: 1; }
    .lightbox-close:hover { color: #ff9800; transform: rotate(90deg) scale(1.1); }

    /* Tooltip for custom status */
    .status-tooltip {
      display: none;
      position: fixed;
      background: #111214;
      color: #dcddde;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 13px;
      max-width: 260px;
      word-wrap: break-word;
      z-index: 9999;
      box-shadow: 0 6px 16px rgba(0,0,0,0.8);
      border: 1px solid #2b2d31;
      pointer-events: none;
      line-height: 1.4;
    }
    .status-tooltip.active { display: block; }

    /* Loading state */
    .loading-pulse {
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>

  <div class="discord-card">
    <div class="discord-banner" id="banner"><div class="discord-banner-inner"></div></div>

    <div class="avatar-container" id="avatar-container">
      <img id="avatar" src="" alt="Avatar">
      <img id="decoration" src="" style="display:none;">
      <div id="status" style="background:#6d6f78;"></div>
    </div>

    <div class="user-info">
      <div id="username" class="loading-pulse">Loading...</div>
      <div id="activity" class="loading-pulse">—</div>

      <div id="activity-card" class="activity-card">
        <img id="activity-image" class="activity-image" src="" alt="Activity">
        <div class="activity-details">
          <div id="activity-name" class="activity-name"></div>
          <div id="activity-state" class="activity-state"></div>
          <div id="activity-details-text" class="activity-details-text"></div>
          <div id="activity-timestamp" class="activity-timestamp"></div>
        </div>
      </div>

      <div id="badges"></div>
    </div>

    <a href="https://discord.com/users/639087320795971625" class="card-link-btn" target="_blank" title="Open Discord profile">
      <i class="fas fa-external-link-alt"></i>
    </a>
  </div>

  <!-- Avatar lightbox -->
  <div class="lightbox" id="avatar-lightbox">
    <span class="lightbox-close">&times;</span>
    <img id="avatar-lightbox-img" src="" alt="Avatar">
  </div>

  <!-- Banner lightbox -->
  <div class="lightbox" id="banner-lightbox">
    <span class="lightbox-close">&times;</span>
    <img id="banner-lightbox-img" src="" alt="Banner">
  </div>

  <!-- Status tooltip -->
  <div class="status-tooltip" id="status-tooltip"></div>

  <script>
    const USER_ID = "639087320795971625";
    const STATUS_COLORS = { online: '#23a55a', idle: '#f0b232', dnd: '#f23f43', offline: '#80848e' };
    let currentBannerUrl = '';
    let elapsedInterval = null;

    async function updateDiscord() {
      try {
        // Profile data (avatar, banner, badges, decoration)
        const profileRes = await fetch(`https://dcdn.dstn.to/profile/${USER_ID}`);
        const profile = await profileRes.json();
        const user = profile.user;

        // Avatar
        const ext = user.avatar?.startsWith('a_') ? 'gif' : 'webp';
        document.getElementById('avatar').src =
          `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.${ext}?size=256`;
        document.getElementById('username').textContent = user.global_name || user.username;
        document.getElementById('username').classList.remove('loading-pulse');

        // Avatar decoration
        const decoData = profile.discord_user?.avatar_decoration_data
          || user?.avatar_decoration_data
          || profile.avatar_decoration_data;
        const deco = document.getElementById('decoration');
        if (decoData?.asset) {
          deco.src = `https://cdn.discordapp.com/avatar-decoration-assets/${decoData.asset}.png?size=256`;
          deco.style.display = 'block';
          deco.onerror = () => { deco.style.display = 'none'; };
        } else {
          deco.style.display = 'none';
        }

        // Banner
        const bannerEl = document.getElementById('banner');
        if (user.banner) {
          const bext = user.banner.startsWith('a_') ? 'gif' : 'png';
          currentBannerUrl = `https://cdn.discordapp.com/banners/${user.id}/${user.banner}.${bext}?size=1024`;
          bannerEl.style.backgroundImage = `url(${currentBannerUrl})`;
          bannerEl.style.backgroundColor = '';
        } else if (user.banner_color) {
          bannerEl.style.backgroundImage = 'none';
          bannerEl.style.backgroundColor = user.banner_color;
          currentBannerUrl = '';
        }

        // Badges
        const badgesEl = document.getElementById('badges');
        badgesEl.innerHTML = '';
        const badges = profile.badges || profile.user_badges || [];
        badges.forEach(badge => {
          const wrapper = document.createElement('div');
          wrapper.className = 'badge-wrapper';
          wrapper.setAttribute('data-title', badge.description || 'Badge');
          const img = document.createElement('img');
          img.src = `https://cdn.discordapp.com/badge-icons/${badge.icon || badge.id}.png`;
          img.className = 'badge-icon';
          img.onerror = () => { wrapper.style.display = 'none'; };
          wrapper.appendChild(img);
          badgesEl.appendChild(wrapper);
        });

        // Lanyard (live status + activity)
        const lanyardRes = await fetch(`https://api.lanyard.rest/v1/users/${USER_ID}`);
        const lanyardJson = await lanyardRes.json();
        const d = lanyardJson.data;

        // Status dot
        document.getElementById('status').style.backgroundColor =
          STATUS_COLORS[d.discord_status] || STATUS_COLORS.offline;

        // Custom status text
        const customStatus = d.activities.find(a => a.type === 4);
        const activityEl = document.getElementById('activity');
        activityEl.textContent = customStatus?.state || '';
        activityEl.classList.remove('loading-pulse');

        // Activity card
        if (elapsedInterval) { clearInterval(elapsedInterval); elapsedInterval = null; }

        const mainActivity = d.activities.find(a => a.type !== 4);
        const activityCard = document.getElementById('activity-card');

        if (mainActivity) {
          activityCard.classList.add('active');

          // Activity image
          const actImg = document.getElementById('activity-image');
          const asset = mainActivity.assets?.large_image || mainActivity.assets?.small_image;
          if (asset) {
            let url = '';
            if (mainActivity.name === 'Spotify') {
              url = `https://i.scdn.co/image/${asset.replace('spotify:', '')}`;
            } else if (asset.startsWith('mp:external/')) {
              url = `https://media.discordapp.net/external/${asset.split('mp:external/')[1]}`;
            } else if (mainActivity.application_id) {
              url = `https://cdn.discordapp.com/app-assets/${mainActivity.application_id}/${asset}.png`;
            }
            actImg.src = url;
            actImg.style.display = url ? 'block' : 'none';
          } else {
            actImg.style.display = 'none';
          }

          document.getElementById('activity-name').textContent = mainActivity.name || '';
          document.getElementById('activity-state').textContent = mainActivity.state || '';
          document.getElementById('activity-details-text').textContent = mainActivity.details || '';

          // Elapsed time
          const tsEl = document.getElementById('activity-timestamp');
          if (mainActivity.timestamps?.start) {
            const start = mainActivity.timestamps.start;
            const tick = () => {
              const ms = Date.now() - start;
              const s = Math.floor((ms / 1000) % 60);
              const m = Math.floor((ms / 60000) % 60);
              const h = Math.floor(ms / 3600000);
              tsEl.textContent = h > 0
                ? `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')} elapsed`
                : `${m}:${String(s).padStart(2,'0')} elapsed`;
            };
            tick();
            elapsedInterval = setInterval(tick, 1000);
          } else {
            tsEl.textContent = '';
          }
        } else {
          activityCard.classList.remove('active');
        }

      } catch (err) {
        console.error('Discord widget error:', err);
        document.getElementById('username').textContent = 'Unavailable';
        document.getElementById('activity').textContent = '';
      }
    }

    updateDiscord();
    setInterval(updateDiscord, 20000);

    // ── Lightbox helpers ──────────────────────────────────────────
    function openLightbox(id, imgSrc) {
      const lb = document.getElementById(id);
      lb.querySelector('img').src = imgSrc;
      lb.classList.add('active');
      document.body.style.overflow = 'hidden';
    }
    function closeLightbox(id) {
      document.getElementById(id).classList.remove('active');
      document.body.style.overflow = '';
    }

    // Avatar click
    document.getElementById('avatar-container').addEventListener('click', () => {
      const src = document.getElementById('avatar').src.replace('size=256', 'size=1024');
      openLightbox('avatar-lightbox', src);
    });

    // Banner click
    document.getElementById('banner').addEventListener('click', () => {
      if (currentBannerUrl) {
        openLightbox('banner-lightbox', currentBannerUrl);
      }
    });

    // Close lightboxes
    document.querySelectorAll('.lightbox').forEach(lb => {
      lb.addEventListener('click', e => {
        if (e.target === lb || e.target.classList.contains('lightbox-close')) {
          closeLightbox(lb.id);
        }
      });
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        document.querySelectorAll('.lightbox.active').forEach(lb => closeLightbox(lb.id));
      }
    });

    // ── Custom status tooltip ─────────────────────────────────────
    const actEl = document.getElementById('activity');
    const tooltip = document.getElementById('status-tooltip');
    let tooltipTimeout;

    function showTooltip() {
      if (actEl.scrollWidth <= actEl.clientWidth) return;
      tooltip.textContent = actEl.textContent;
      tooltip.classList.add('active');
      const r = actEl.getBoundingClientRect();
      const tr = tooltip.getBoundingClientRect();
      let left = r.left + r.width / 2 - tr.width / 2;
      left = Math.max(8, Math.min(left, window.innerWidth - tr.width - 8));
      tooltip.style.left = left + 'px';
      tooltip.style.top = (r.bottom + 8) + 'px';
    }

    actEl.addEventListener('mouseenter', () => { clearTimeout(tooltipTimeout); showTooltip(); });
    actEl.addEventListener('mouseleave', () => { tooltipTimeout = setTimeout(() => tooltip.classList.remove('active'), 200); });
    actEl.addEventListener('click', showTooltip);
    window.addEventListener('scroll', () => tooltip.classList.remove('active'), { passive: true });
  </script>
</body>
</html>
